name: Build iOS

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    name: Build for iOS
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install certificate
        env:
          P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
        run: |
          echo $P12_BASE64 | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain -P $P12_PASSWORD -A
          security list-keychains -s build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

      - name: Install provisioning profile
        env:
          PROVISION_BASE64: ${{ secrets.IOS_PROVISION_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo $PROVISION_BASE64 | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      - name: Run xcodebuild
        run: |
          xcodebuild \
            -project Unity-iPhone.xcodeproj \
            -scheme Unity-iPhone \
            -configuration Release \
            -destination generic/platform=iOS \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="${{ secrets.BUNDLE_ID }}" \
            CODE_SIGN_IDENTITY="Apple Development" \
            DEVELOPMENT_TEAM=39Z5QDFQQG \
            archive \
            -archivePath /Users/runner/work/_temp/app.xcarchive \
            -allowProvisioningUpdates

      - name: Export IPA
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath /Users/runner/work/_temp/app.xcarchive \
            -exportPath /Users/runner/work/_temp/ipa \
            -exportOptionsPlist ExportOptions.plist \
            -allowProvisioningUpdates

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: TryOnApp-iOS
          path: /Users/runner/work/_temp/ipa/*.ipa
