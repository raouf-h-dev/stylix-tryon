name: Build iOS

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    name: Build for iOS
    runs-on: macos-latest

    steps:
      # 1. Checkout without LFS (we'll do it manually)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: false

      # 2. Install Git LFS and authenticate with GITHUB_TOKEN
      - name: Pull LFS files with authentication
        run: |
          git lfs install
          # Tell Git LFS to use the GitHub token for authentication
          git config --global lfs.https://github.com/${{ github.repository }}.git/info/lfs.access basic
          git config --global http.https://github.com/.extraheader "Authorization: bearer ${{ secrets.GITHUB_TOKEN }}"
          # Download all LFS objects
          git lfs fetch --all
          git lfs checkout

      # 3. Verify that the static libraries are now real binaries (not pointers)
      - name: Verify static libraries
        run: |
          for lib in Libraries/*.a Libraries/**/*.a; do
            if [ -f "$lib" ]; then
              size=$(stat -f%z "$lib")
              echo "$lib : $size bytes"
              if [ "$size" -lt 5000 ]; then
                echo "❌ $lib is still an LFS pointer (too small)"
                echo "First 200 bytes:"
                head -c 200 "$lib"
                exit 1
              fi
            fi
          done
          echo "✅ All library files are valid"

      # 4. Install certificate
      - name: Install certificate
        env:
          P12_BASE64: ${{ secrets.CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          echo "$P12_BASE64" | base64 --decode > $CERTIFICATE_PATH
          security create-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
          security import $CERTIFICATE_PATH -k build.keychain -P "$P12_PASSWORD" -A
          security list-keychains -s build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

      # 5. Install provisioning profile
      - name: Install provisioning profile
        env:
          PROVISION_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISION_BASE64" | base64 --decode > \
            ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision
          mkdir -p ~/Library/Developer/Xcode/UserData/Provisioning\ Profiles
          echo "$PROVISION_BASE64" | base64 --decode > \
            ~/Library/Developer/Xcode/UserData/Provisioning\ Profiles/profile.mobileprovision

      # 6. Force automatic signing
      - name: Force Automatic signing
        run: |
          sed -i '' 's/CODE_SIGN_STYLE = Manual;/CODE_SIGN_STYLE = Automatic;/g' \
            Unity-iPhone.xcodeproj/project.pbxproj

      # 7. Create ExportOptions.plist (required for export)
      - name: Create ExportOptions.plist
        run: |
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>ad-hoc</string>
            <key>teamID</key>
            <string>39Z5QDFQQG</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.stylix.tryon</key>
              <string>profile.mobileprovision</string>
            </dict>
          </dict>
          </plist>
          EOF

      # 8. Build archive
      - name: Run xcodebuild archive
        run: |
          xcodebuild \
            -project Unity-iPhone.xcodeproj \
            -scheme Unity-iPhone \
            -configuration Release \
            -destination generic/platform=iOS \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=39Z5QDFQQG \
            archive \
            -archivePath $RUNNER_TEMP/app.xcarchive

      # 9. Export IPA
      - name: Export IPA
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath $RUNNER_TEMP/app.xcarchive \
            -exportPath $RUNNER_TEMP/ipa \
            -exportOptionsPlist ExportOptions.plist

      # 10. Upload IPA
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: TryOnApp-iOS
          path: ${{ runner.temp }}/ipa/*.ipa
