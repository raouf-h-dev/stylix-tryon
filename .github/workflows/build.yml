name: Build iOS

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    name: Build for iOS
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Validate static libraries
        run: |
          for lib in Libraries/*.a Libraries/**/*.a; do
            if [ -f "$lib" ]; then
              echo "Checking $lib"
              file "$lib"
              # ar -t lists object files inside the archive; fails if invalid
              ar -t "$lib" > /dev/null || { echo "❌ $lib is invalid"; exit 1; }
            fi
          done
      - name: Pull LFS files (force)
        run: |
          git lfs install
          git lfs fetch --all   # fetch all LFS objects from remote
          git lfs checkout      # replace pointers with actual files
          echo "=== Verify a few .a files ==="
          file Libraries/libiPhone-lib.a
          file Libraries/baselib.a
          # Ensure they are Mach-O archives (not ASCII text)
          if file Libraries/libiPhone-lib.a | grep -q "ASCII text"; then
            echo "❌ libiPhone-lib.a is still an LFS pointer – LFS not working correctly"
            exit 1
          fi
              
      - name: Check library files
        run: |
          echo "=== File sizes ==="
          ls -la Libraries/*.a Libraries/**/*.a 2>/dev/null | head -20
          echo "=== First bytes of libiPhone-lib.a ==="
          head -c 100 Libraries/libiPhone-lib.a
          echo "=== Git LFS status ==="
          git lfs ls-files | head -20

      - name: Debug LFS files
        run: |
          echo "=== First 200 bytes of baselib.a ==="
          head -c 200 Libraries/baselib.a
          echo ""
          echo "=== File type ==="
          file Libraries/baselib.a
          echo "=== Git LFS tracked files ==="
          git lfs ls-files | grep -E "baselib|libiPhone"
          
      - name: Install certificate
        env:
          P12_BASE64: ${{ secrets.CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          echo "$P12_BASE64" | base64 --decode > $CERTIFICATE_PATH
          security create-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
          security import $CERTIFICATE_PATH -k build.keychain -P "$P12_PASSWORD" -A
          security list-keychains -s build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

      - name: Install provisioning profile
        env:
          PROVISION_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISION_BASE64" | base64 --decode > \
            ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision
          mkdir -p ~/Library/Developer/Xcode/UserData/Provisioning\ Profiles
          echo "$PROVISION_BASE64" | base64 --decode > \
            ~/Library/Developer/Xcode/UserData/Provisioning\ Profiles/profile.mobileprovision

      - name: Force Automatic signing
        run: |
          sed -i '' 's/CODE_SIGN_STYLE = Manual;/CODE_SIGN_STYLE = Automatic;/g' \
            Unity-iPhone.xcodeproj/project.pbxproj

      - name: Run xcodebuild
        run: |
          xcodebuild \
            -project Unity-iPhone.xcodeproj \
            -scheme Unity-iPhone \
            -configuration Release \
            -destination generic/platform=iOS \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=39Z5QDFQQG \
            archive \
            -archivePath /Users/runner/work/_temp/app.xcarchive

      - name: Export IPA
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath /Users/runner/work/_temp/app.xcarchive \
            -exportPath /Users/runner/work/_temp/ipa \
            -exportOptionsPlist ExportOptions.plist

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: TryOnApp-iOS
          path: /Users/runner/work/_temp/ipa/*.ipa
