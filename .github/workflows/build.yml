name: Build iOS

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    name: Build for iOS
    runs-on: macos-latest

    steps:
      # 1. Checkout with LFS (automatically downloads real binaries)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 1

      # 2. Verify static libraries are real (not LFS pointers)
      - name: Verify static libraries
        run: |
          for lib in Libraries/*.a Libraries/**/*.a; do
            if [ -f "$lib" ]; then
              size=$(stat -f%z "$lib")
              if [ "$size" -lt 5000 ]; then
                echo "❌ $lib is too small ($size bytes) – still an LFS pointer"
                echo "First 200 bytes:"
                head -c 200 "$lib"
                exit 1
              fi
              echo "✅ $lib ($size bytes)"
            fi
          done

      # 3. Install certificate
      - name: Install certificate
        env:
          P12_BASE64: ${{ secrets.CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          echo "$P12_BASE64" | base64 --decode > $CERTIFICATE_PATH
          security create-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
          security import $CERTIFICATE_PATH -k build.keychain -P "$P12_PASSWORD" -A
          security list-keychains -s build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

      # 4. Install provisioning profile
      - name: Install provisioning profile
        env:
          PROVISION_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISION_BASE64" | base64 --decode > \
            ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision
          mkdir -p ~/Library/Developer/Xcode/UserData/Provisioning\ Profiles
          echo "$PROVISION_BASE64" | base64 --decode > \
            ~/Library/Developer/Xcode/UserData/Provisioning\ Profiles/profile.mobileprovision

      # 5. Force automatic signing in Xcode project
      - name: Force Automatic signing
        run: |
          sed -i '' 's/CODE_SIGN_STYLE = Manual;/CODE_SIGN_STYLE = Automatic;/g' \
            Unity-iPhone.xcodeproj/project.pbxproj

      # 6. Create ExportOptions.plist (required for IPA export)


      - name: Unlock keychain for codesign
        run: |
         security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
         security set-key-partition-list -S apple-tool:,apple: -s -k "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain

      # 7. Build archive
      - name: Run xcodebuild archive
        run: |
          xcodebuild \
            -project Unity-iPhone.xcodeproj \
            -scheme Unity-iPhone \
            -configuration Release \
            -destination generic/platform=iOS \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=39Z5QDFQQG \
            archive \
            -archivePath $RUNNER_TEMP/app.xcarchive
        env:
         CODESIGN_ALLOCATE: /Applications/Xcode_16.4.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/bin/codesign_allocate
      # 8. Export IPA
      - name: Export IPA
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath $RUNNER_TEMP/app.xcarchive \
            -exportPath $RUNNER_TEMP/ipa \
            -exportOptionsPlist ExportOptions.plist

      # 9. Upload IPA as artifact
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: TryOnApp-iOS
          path: ${{ runner.temp }}/ipa/*.ipa
