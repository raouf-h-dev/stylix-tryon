name: Build iOS

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    name: Build for iOS
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install certificate
        env:
          P12_BASE64: ${{ secrets.CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          echo $P12_BASE64 | base64 --decode > certificate.p12
          security create-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
          security import certificate.p12 -k build.keychain -P $P12_PASSWORD -A
          security list-keychains -s build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

      - name: Install provisioning profile
        env:
          PROVISION_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo $PROVISION_BASE64 | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      - name: Patch Xcode project
        run: |
          python3 - <<'EOF'
          import re, subprocess, os

          profile_path = os.path.expanduser(
              "~/Library/MobileDevice/Provisioning Profiles/profile.mobileprovision"
          )

          result = subprocess.run(
              ["security", "cms", "-D", "-i", profile_path],
              capture_output=True, text=True
          )
          plist_text = result.stdout

          uuid = re.search(r"<key>UUID</key>\s*<string>([^<]+)</string>", plist_text).group(1)
          print(f"✅ Profile UUID: {uuid}")

          raw_app_id = re.search(
              r"<key>application-identifier</key>\s*<string>([^<]+)</string>", plist_text
          ).group(1)
          bundle_id = raw_app_id.split(".", 1)[1]
          print(f"✅ Profile bundle ID: {bundle_id}")

          team_id = re.search(
              r"<key>TeamIdentifier</key>\s*<array>\s*<string>([^<]+)</string>", plist_text
          ).group(1)
          print(f"✅ Profile team ID: {team_id}")

          # Export for use in later steps
          with open(os.environ["GITHUB_ENV"], "a") as f:
              f.write(f"PROFILE_UUID={uuid}\n")
              f.write(f"BUNDLE_ID={bundle_id}\n")

          with open("Unity-iPhone.xcodeproj/project.pbxproj", "r") as f:
              content = f.read()

          # Print what bundle IDs currently exist in the project (diagnostic)
          current_ids = re.findall(r"PRODUCT_BUNDLE_IDENTIFIER = ([^;]+);", content)
          print(f"📋 Bundle IDs in project BEFORE patch: {set(current_ids)}")

          # Replace ALL bundle IDs with the one from the profile
          content = re.sub(
              r"(PRODUCT_BUNDLE_IDENTIFIER = )[^;]+(;)",
              lambda m: f"{m.group(1)}{bundle_id}{m.group(2)}",
              content
          )

          # Verify after patch
          patched_ids = re.findall(r"PRODUCT_BUNDLE_IDENTIFIER = ([^;]+);", content)
          print(f"📋 Bundle IDs in project AFTER patch: {set(patched_ids)}")

          # Inject UUID — if key exists replace it, otherwise insert it
          if "PROVISIONING_PROFILE =" in content:
              count = len(re.findall(r"PROVISIONING_PROFILE =", content))
              print(f"📋 Found {count} PROVISIONING_PROFILE entries, replacing all")
              content = re.sub(
                  r'PROVISIONING_PROFILE = [^;]*;',
                  f'PROVISIONING_PROFILE = "{uuid}";',
                  content
              )
          else:
              print("📋 No PROVISIONING_PROFILE key found — injecting after CODE_SIGN_STYLE = Manual")
              content = content.replace(
                  "CODE_SIGN_STYLE = Manual;",
                  f'CODE_SIGN_STYLE = Manual;\n\t\t\t\tPROVISIONING_PROFILE = "{uuid}";'
              )

          content = re.sub(
              r'PROVISIONING_PROFILE_SPECIFIER = [^;]*;',
              'PROVISIONING_PROFILE_SPECIFIER = "";',
              content
          )

          # Force UnityFramework to Automatic signing
          # Target sections are separated by their names, so find the UnityFramework block
          def fix_unity_framework(m):
              return m.group(0).replace("CODE_SIGN_STYLE = Manual", "CODE_SIGN_STYLE = Automatic")

          content = re.sub(
              r'\/\* UnityFramework \*\/.*?(?=\/\* [A-Z])',
              fix_unity_framework,
              content,
              flags=re.DOTALL
          )

          with open("Unity-iPhone.xcodeproj/project.pbxproj", "w") as f:
              f.write(content)

          print("✅ Patching complete.")
          EOF

      - name: Debug — show signing section of pbxproj
        run: |
          echo "=== PROVISIONING_PROFILE entries ==="
          grep -n "PROVISIONING_PROFILE" Unity-iPhone.xcodeproj/project.pbxproj || echo "(none found)"
          echo "=== BUNDLE_ID entries ==="
          grep -n "PRODUCT_BUNDLE_IDENTIFIER" Unity-iPhone.xcodeproj/project.pbxproj
          echo "=== CODE_SIGN_STYLE entries ==="
          grep -n "CODE_SIGN_STYLE" Unity-iPhone.xcodeproj/project.pbxproj

      - name: Run xcodebuild
        run: |
          xcodebuild \
            -project Unity-iPhone.xcodeproj \
            -scheme Unity-iPhone \
            -configuration Release \
            -destination generic/platform=iOS \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE="$PROFILE_UUID" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_UUID" \
            CODE_SIGN_IDENTITY="Apple Development" \
            DEVELOPMENT_TEAM=39Z5QDFQQG \
            archive \
            -archivePath /Users/runner/work/_temp/app.xcarchive \
            -allowProvisioningUpdates

      - name: Export IPA
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath /Users/runner/work/_temp/app.xcarchive \
            -exportPath /Users/runner/work/_temp/ipa \
            -exportOptionsPlist ExportOptions.plist

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: TryOnApp-iOS
          path: /Users/runner/work/_temp/ipa/*.ipa
