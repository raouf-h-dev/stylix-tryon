name: Build iOS

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    name: Build for iOS
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install certificate
        env:
          P12_BASE64: ${{ secrets.CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          echo "$P12_BASE64" | base64 --decode > $CERTIFICATE_PATH
          security create-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
          security import $CERTIFICATE_PATH -k build.keychain -P "$P12_PASSWORD" -A
          security list-keychains -s build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

      - name: Install provisioning profile
        env:
          PROVISION_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          echo "$PROVISION_BASE64" | base64 --decode > /tmp/profile.mobileprovision

          PROFILE_UUID=$( security cms -D -i /tmp/profile.mobileprovision \
            | grep -A1 "<key>UUID</key>" \
            | grep "<string>" \
            | sed 's/.*<string>\(.*\)<\/string>.*/\1/' \
            | tr -d '[:space:]' )
          echo "PROFILE_UUID=$PROFILE_UUID" >> $GITHUB_ENV
          echo "Extracted UUID: $PROFILE_UUID"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp /tmp/profile.mobileprovision \
            ~/Library/MobileDevice/Provisioning\ Profiles/${PROFILE_UUID}.mobileprovision

          mkdir -p ~/Library/Developer/Xcode/UserData/Provisioning\ Profiles
          cp /tmp/profile.mobileprovision \
            ~/Library/Developer/Xcode/UserData/Provisioning\ Profiles/${PROFILE_UUID}.mobileprovision

          echo "Installed:"
          ls ~/Library/MobileDevice/Provisioning\ Profiles/
          ls ~/Library/Developer/Xcode/UserData/Provisioning\ Profiles/

      - name: Patch pbxproj
        run: |
          PBXPROJ="Unity-iPhone.xcodeproj/project.pbxproj"

          # Remove all existing provisioning profile lines
          sed -i '' '/PROVISIONING_PROFILE = /d' "$PBXPROJ"
          sed -i '' '/PROVISIONING_PROFILE_SPECIFIER = /d' "$PBXPROJ"

          # Force Manual signing everywhere
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' "$PBXPROJ"

          # Inject UUID after every CODE_SIGN_STYLE = Manual; line
          sed -i '' "s/CODE_SIGN_STYLE = Manual;/CODE_SIGN_STYLE = Manual;\n\t\t\t\tPROVISIONING_PROFILE = \"${PROFILE_UUID}\";/" "$PBXPROJ"

          echo "=== CODE_SIGN_STYLE and PROVISIONING_PROFILE after patch ==="
          grep -E "CODE_SIGN_STYLE|PROVISIONING_PROFILE" "$PBXPROJ"

      - name: Run xcodebuild
        run: |
          xcodebuild \
            -project Unity-iPhone.xcodeproj \
            -scheme Unity-iPhone \
            -configuration Release \
            -destination generic/platform=iOS \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Development" \
            PROVISIONING_PROFILE="$PROFILE_UUID" \
            DEVELOPMENT_TEAM=39Z5QDFQQG \
            archive \
            -archivePath /Users/runner/work/_temp/app.xcarchive

      - name: Export IPA
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath /Users/runner/work/_temp/app.xcarchive \
            -exportPath /Users/runner/work/_temp/ipa \
            -exportOptionsPlist ExportOptions.plist

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: TryOnApp-iOS
          path: /Users/runner/work/_temp/ipa/*.ipa
