name: Build iOS

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    name: Build for iOS
    runs-on: macos-latest

    steps:
      - name: Checkout repository with LFS
        uses: actions/checkout@v4
        with:
          lfs: true          # Git LFS files are automatically downloaded

      - name: Verify static libraries (just check they are not tiny pointers)
        run: |
          for lib in Libraries/*.a Libraries/**/*.a; do
            if [ -f "$lib" ]; then
              size=$(stat -f%z "$lib")
              if [ "$size" -lt 5000 ]; then
                echo "❌ $lib is too small ($size bytes) – probably an LFS pointer"
                exit 1
              fi
              echo "✅ $lib looks OK ($size bytes)"
            fi
          done

      - name: Install certificate
        env:
          P12_BASE64: ${{ secrets.CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          echo "$P12_BASE64" | base64 --decode > $CERTIFICATE_PATH
          security create-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
          security import $CERTIFICATE_PATH -k build.keychain -P "$P12_PASSWORD" -A
          security list-keychains -s build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

      - name: Install provisioning profile
        env:
          PROVISION_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISION_BASE64" | base64 --decode > \
            ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision
          mkdir -p ~/Library/Developer/Xcode/UserData/Provisioning\ Profiles
          echo "$PROVISION_BASE64" | base64 --decode > \
            ~/Library/Developer/Xcode/UserData/Provisioning\ Profiles/profile.mobileprovision

      - name: Force Automatic signing
        run: |
          sed -i '' 's/CODE_SIGN_STYLE = Manual;/CODE_SIGN_STYLE = Automatic;/g' \
            Unity-iPhone.xcodeproj/project.pbxproj

      - name: Create ExportOptions.plist
        run: |
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>ad-hoc</string>
            <key>teamID</key>
            <string>39Z5QDFQQG</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.stylix.tryon</key>
              <string>profile.mobileprovision</string>
            </dict>
          </dict>
          </plist>
          EOF

      - name: Run xcodebuild archive
        run: |
          xcodebuild \
            -project Unity-iPhone.xcodeproj \
            -scheme Unity-iPhone \
            -configuration Release \
            -destination generic/platform=iOS \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=39Z5QDFQQG \
            archive \
            -archivePath $RUNNER_TEMP/app.xcarchive

      - name: Export IPA
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath $RUNNER_TEMP/app.xcarchive \
            -exportPath $RUNNER_TEMP/ipa \
            -exportOptionsPlist ExportOptions.plist

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: TryOnApp-iOS
          path: ${{ runner.temp }}/ipa/*.ipa
