name: Build iOS

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    name: Build for iOS
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install certificate
        env:
          P12_BASE64: ${{ secrets.CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          echo $P12_BASE64 | base64 --decode > certificate.p12
          security create-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
          security import certificate.p12 -k build.keychain -P $P12_PASSWORD -A
          security list-keychains -s build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

      - name: Install provisioning profile
        env:
          PROVISION_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo $PROVISION_BASE64 | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      - name: Patch Xcode project
        run: |
          python3 - <<'EOF'
          import re, subprocess, os

          profile_path = os.path.expanduser(
              "~/Library/MobileDevice/Provisioning Profiles/profile.mobileprovision"
          )

          # Decode the profile
          result = subprocess.run(
              ["security", "cms", "-D", "-i", profile_path],
              capture_output=True, text=True
          )
          plist_text = result.stdout

          # Extract UUID
          uuid = re.search(r"<key>UUID</key>\s*<string>([^<]+)</string>", plist_text).group(1)
          print(f"Profile UUID: {uuid}")

          # Extract expected bundle ID
          raw_app_id = re.search(
              r"<key>application-identifier</key>\s*<string>([^<]+)</string>", plist_text
          ).group(1)
          bundle_id = raw_app_id.split(".", 1)[1]  # strip team prefix e.g. "39Z5QDFQQG."
          print(f"Profile bundle ID: {bundle_id}")

          with open("Unity-iPhone.xcodeproj/project.pbxproj", "r") as f:
              content = f.read()

          # Fix bundle ID — replace whatever Unity set, but NOT UnityFramework's entry
          content = re.sub(
              r"(PRODUCT_BUNDLE_IDENTIFIER = )(?!" + re.escape(bundle_id) + r"\.)([^;]+)(;)",
              lambda m: f"{m.group(1)}{bundle_id}{m.group(3)}",
              content
          )

          # Write UUID directly into the project for Unity-iPhone (Manual signing)
          content = re.sub(
              r"PROVISIONING_PROFILE = [^;]*;",
              f'PROVISIONING_PROFILE = "{uuid}";',
              content
          )
          content = re.sub(
              r"PROVISIONING_PROFILE_SPECIFIER = [^;]*;",
              'PROVISIONING_PROFILE_SPECIFIER = "";',
              content
          )

          # Set UnityFramework to Automatic so it doesn't need a profile
          content = re.sub(
              r"(UnityFramework[^\n]*\n(?:[^\n]*\n){0,30}?CODE_SIGN_STYLE = )Manual",
              r"\1Automatic",
              content
          )

          with open("Unity-iPhone.xcodeproj/project.pbxproj", "w") as f:
              f.write(content)

          print("Patching complete.")
          EOF

      - name: Run xcodebuild
        run: |
          xcodebuild \
            -project Unity-iPhone.xcodeproj \
            -scheme Unity-iPhone \
            -configuration Release \
            -destination generic/platform=iOS \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Development" \
            DEVELOPMENT_TEAM=39Z5QDFQQG \
            archive \
            -archivePath /Users/runner/work/_temp/app.xcarchive

      - name: Export IPA
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath /Users/runner/work/_temp/app.xcarchive \
            -exportPath /Users/runner/work/_temp/ipa \
            -exportOptionsPlist ExportOptions.plist

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: TryOnApp-iOS
          path: /Users/runner/work/_temp/ipa/*.ipa
